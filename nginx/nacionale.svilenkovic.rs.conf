server {
    listen 80;
    server_name nacionale.svilenkovic.rs;

    # Allow ACME challenges for SSL renewal
    location ^~ /.well-known/acme-challenge/ {
        allow all;
        root /home/nacionale.svilenkovic.rs/public_html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name nacionale.svilenkovic.rs;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/nacionale.svilenkovic.rs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nacionale.svilenkovic.rs/privkey.pem;

    root /home/nacionale.svilenkovic.rs/public_html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot|glb|gltf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # PHP API
    location /api/ {
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 30;
        }
    }

    # Block direct access to config
    location = /api/config.php {
        deny all;
        return 403;
    }

    # Next.js static export — SPA fallback per section
    # Try the exact file first, then directory index, then section fallback
    location /products/ {
        try_files $uri $uri/index.html /products/index.html;
    }

    location /collections/ {
        try_files $uri $uri/index.html /collections/index.html;
    }

    location /cart/ {
        try_files $uri $uri/index.html /cart/index.html;
    }

    location /order/ {
        try_files $uri $uri/index.html /order/index.html;
    }

    # Default
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /home/nacionale.svilenkovic.rs/logs/access.log;
    error_log /home/nacionale.svilenkovic.rs/logs/error.log;
}
